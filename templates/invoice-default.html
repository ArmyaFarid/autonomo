<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: 11pt;
    color: #1a1a1a;
    background: #fff;
}

.page {
    padding: 64px 72px;
    max-width: 860px;
    margin: 0 auto;
}

/* ── Top: logo left, issuer right ── */
.top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 52px;
}

.logo img {
    max-height: 56px;
    max-width: 140px;
    object-fit: contain;
}

.issuer {
    text-align: right;
    line-height: 1.75;
    font-size: 10.5pt;
}

/* ── Meta bar ── */
.meta {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1.6fr;
    gap: 16px;
    align-items: end;
    margin-bottom: 6px;
}

.meta-label {
    font-size: 9.5pt;
    color: #5a8fa5;
    margin-bottom: 5px;
}

.meta-value {
    font-weight: 600;
    font-size: 11pt;
}

.meta-client-addr {
    font-size: 9.5pt;
    color: #555;
    margin-top: 4px;
    line-height: 1.5;
}

.meta-amount-block {
    text-align: right;
}

.meta-total-label {
    font-size: 9.5pt;
    color: #5a8fa5;
    margin-bottom: 5px;
    text-align: right;
}

.meta-total-value {
    font-size: 28pt;
    font-weight: 700;
    line-height: 1;
}

.divider {
    border: none;
    border-top: 1.5px solid #c8d8e2;
    margin: 20px 0 36px;
}

/* ── Line items table ── */
table {
    width: 100%;
    border-collapse: collapse;
}

thead th {
    font-size: 9.5pt;
    font-weight: 500;
    color: #5a8fa5;
    padding: 0 0 10px 0;
    text-align: right;
    border-bottom: 1.5px solid #c8d8e2;
}

thead th.col-desc { text-align: left; }

tbody tr td {
    padding: 16px 0;
    border-bottom: 1px solid #e8ecef;
    vertical-align: top;
}

.desc-title { font-weight: 600; font-size: 11pt; }
.desc-date   { font-size: 9.5pt; color: #777; margin-top: 3px; }

td.right { text-align: right; }
td.col-rate  { min-width: 80px; }
td.col-qty   { min-width: 50px; }
td.col-amt   { min-width: 90px; font-weight: 500; }

/* ── Totals ── */
.totals-wrap {
    display: flex;
    justify-content: flex-end;
    margin-top: 28px;
}

.totals-table {
    width: 300px;
    border-collapse: collapse;
}

.totals-table td {
    padding: 5px 0;
    font-size: 10.5pt;
}

.t-label { text-align: right; padding-right: 28px; color: #444; }
.t-value { text-align: right; min-width: 90px; }

.t-sep td { border-top: 1px solid #c8d8e2; padding-top: 8px; }

.t-due .t-label { color: #5a8fa5; font-weight: 600; font-size: 11pt; }
.t-due .t-value { color: #5a8fa5; font-weight: 700; font-size: 11pt; }

/* ── Description block ── */
.desc-block {
    margin-bottom: 28px;
    padding: 12px 16px;
    background: #f0f6f9;
    border-left: 3px solid #5a8fa5;
    border-radius: 3px;
}
.desc-block-period {
    font-size: 9.5pt;
    font-weight: 600;
    color: #5a8fa5;
    margin-bottom: 5px;
}
.desc-block-services {
    font-size: 10.5pt;
    color: #1a1a1a;
    line-height: 1.55;
}
</style>
</head>
<body>
<div class="page">

    <!-- Issuer -->
    <div class="top">
        <div class="logo">{{logoBlock}}</div>
        <div class="issuer">{{issuerBlock}}</div>
    </div>

    <!-- Meta bar -->
    <div class="meta">
        <div>
            <div class="meta-label">Facturé à</div>
            <div class="meta-value">{{clientName}}</div>
            <div class="meta-client-addr">{{clientAddress}}</div>
        </div>
        <div>
            <div class="meta-label">Date d'émission</div>
            <div class="meta-value">{{date}}</div>
            {{dueDateBlock}}
        </div>
        <div>
            <div class="meta-label">Numéro de facture</div>
            <div class="meta-value">{{number}}</div>
        </div>
        <div class="meta-amount-block">
            <div class="meta-total-label">Montant dû (CAD)</div>
            <div class="meta-total-value">{{total}}</div>
        </div>
    </div>

    <hr class="divider" />

    {{descriptionBlock}}

    <!-- Line items -->
    <table>
        <thead>
            <tr>
                <th class="col-desc">Description</th>
                <th class="right col-rate">Taux</th>
                <th class="right col-qty">Qté</th>
                <th class="right col-amt">Montant</th>
            </tr>
        </thead>
        <tbody>
            {{lineItems}}
        </tbody>
    </table>

    <!-- Totals -->
    <div class="totals-wrap">
        <table class="totals-table">
            {{totalsRows}}
        </table>
    </div>

</div>
</body>
</html>
