appId: com.armyabakouan.easyFreelancer
productName: vue-ts
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
#afterSign: build/notarize.js
win:
  executableName: vue-ts
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  identity: null
  cscLink: null
  entitlements: build-config/entitlements.mac.plist
  entitlementsInherit: build-config/entitlements.mac.plist
  hardenedRuntime: true
  extendInfo:
    - NSFaceIDUsageDescription: "This app uses Touch ID to securely access your invoicing data."
    - NSDocumentsFolderUsageDescription: "This app needs access to your Documents folder to save and manage invoices."
    - NSDownloadsFolderUsageDescription: "This app needs access to your Downloads folder to export PDF reports."
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: generic
  url: https://example.com/auto-updates
